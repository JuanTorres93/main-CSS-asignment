<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/typography.css" />
    <link rel="stylesheet" href="css/style.css" />

    <title>Document</title>
  </head>

  <body>
    <section>
      <h2 class="section-title">Why dance with us?</h2>

      <ul class="feature-list">
        <li>
          <figure class="feature">
            <img
              src="./images/features/1.webp"
              alt="A teacher guiding students during a dance class."
            />

            <figcaption>
              Learn from experienced instructors who will help you improve your
              skills with confidence.
            </figcaption>
          </figure>
        </li>

        <li>
          <figure class="feature">
            <img
              src="./images/features/2.webp"
              alt="Students of different ages and abilities dancing together."
            />

            <figcaption>
              Whether you're a complete beginner or an experienced dancer, we
              have the perfect class for you.
            </figcaption>
          </figure>
        </li>

        <li>
          <figure class="feature">
            <img
              src="./images/features/3.webp"
              alt="Students laughing and interacting before or after class."
            />

            <figcaption>
              Join a welcoming environment where you can make friends, have fun,
              and grow together.
            </figcaption>
          </figure>
        </li>

        <li>
          <figure class="feature">
            <img
              src="./images/features/4.webp"
              alt="A showcase of different styles such as Salsa, Bachata, Hip-Hop, and Contemporary."
            />

            <figcaption>
              Explore a wide range of dance styles and discover the one that
              inspires you most.
            </figcaption>
          </figure>
        </li>
      </ul>
    </section>
    
    <section class="cta">
      <div class="cta__content">
        <h3 class="cta__title">Call to action! It's time!</h3>
        <p class="cta__description">
          Sign up for our product by clicking that button right over there!
        </p>
      </div>
      <div class="cta__button-container">
        <button class="cta__button">Sign up</button>
      </div>
    </section>
    
    <footer class="footer">
      <span class="footer__copyright">Copyright ©</span>
    </footer>
  </body>
</html>
